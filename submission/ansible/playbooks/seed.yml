---
- name: Seed Data into Redis Cluster
  hosts: redis-node-1
  become: yes
  tasks:
    - name: Seed keys and count placement
      shell: |
        python3 -c '
        import subprocess
        import hashlib
        import re

        master_counts = {
            "10.10.0.11:6379": 0,
            "10.10.0.12:6379": 0,
            "10.10.0.13:6379": 0
        }
        total_inserted = 0

        for i in range(1, 1001):
            key = f"key:{i:04d}"
            val = hashlib.sha256(key.encode()).hexdigest()
            
            cmd = ["redis-cli", "-c", "-h", "10.10.0.11", "-p", "6379", "SET", key, val]
            res = subprocess.run(cmd, capture_output=True, text=True)
            
            redirect_match = re.search(r"located at (10\.10\.0\.\d+:6379)", res.stderr)
            if redirect_match:
                target_ip_port = redirect_match.group(1)
            else:
                target_ip_port = "10.10.0.11:6379"
                
            if target_ip_port in master_counts:
                master_counts[target_ip_port] += 1
            else:
                master_counts[target_ip_port] = 1
                
            if "OK" in res.stdout or "OK" in res.stderr:
                total_inserted += 1

        print(f"Total inserted: {total_inserted}")
        print("Keys per master:")
        for ip_port, count in sorted(master_counts.items()):
            print(f"  {ip_port}: {count}")
        '
      register: seed_results
      changed_when: true

    - name: Display Seeding Results
      debug:
        msg: "{{ seed_results.stdout }}"
...
