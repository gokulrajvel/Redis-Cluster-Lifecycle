---
- name: Seed Data into Redis Cluster
  hosts: redis-node-1
  become: yes
  tasks:
    - name: Seed keys and count placement
      shell: |
        python3 << 'PYEOF'
        import subprocess
        import hashlib
        import re

        # Query masters list first to perform FLUSHDB and then display distribution
        nodes_res = subprocess.run(["redis-cli", "-h", "127.0.0.1", "-p", "6379", "cluster", "nodes"], capture_output=True, text=True)
        masters = []
        for line in nodes_res.stdout.splitlines():
            if "master" in line:
                parts = line.split()
                if len(parts) >= 2:
                    ip_port = parts[1].split("@")[0]
                    masters.append(ip_port)

        # Flush all master databases to guarantee clean, accurate seeding metrics
        for m in masters:
            m_ip, m_port = m.split(":")
            subprocess.run(["redis-cli", "-h", m_ip, "-p", m_port, "FLUSHDB"], capture_output=True)

        total_inserted = 0
        failed = 0
        num_keys = {{ num_keys | default(1000) | int }}

        for i in range(1, num_keys + 1):
            key = "key:" + str(i).zfill(4)
            val = hashlib.sha256(key.encode()).hexdigest()
            cmd = ["redis-cli", "-c", "-h", "127.0.0.1", "-p", "6379", "SET", key, val]
            res = subprocess.run(cmd, capture_output=True, text=True)
            if "OK" in res.stdout:
                total_inserted += 1
            else:
                failed += 1

        # Store metadata:num_keys in the cluster
        subprocess.run(["redis-cli", "-c", "-h", "127.0.0.1", "-p", "6379", "SET", "metadata:num_keys", str(num_keys)], capture_output=True)

        print("Total inserted: " + str(total_inserted))
        print("Failed: " + str(failed))

        print("\nKey Distribution across Masters:")
        for m in sorted(masters):
            m_ip, m_port = m.split(":")
            dbsize_res = subprocess.run(["redis-cli", "-h", m_ip, "-p", m_port, "DBSIZE"], capture_output=True, text=True)
            print(f"  {m}: {dbsize_res.stdout.strip()} keys")
        PYEOF
      register: seed_results
      changed_when: true

    - name: Display Seeding Results
      debug:
        msg: "{{ seed_results.stdout }}"
...
