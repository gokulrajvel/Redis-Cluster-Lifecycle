---
- name: Pre-Flight Checks & Dynamic Topology Discovery
  hosts: redis-node-1
  become: yes
  vars:
    target_version: "{{ redis_version | default('7.2.6') }}"
  tasks:
    - name: Verify cluster health
      command: redis-cli -h 127.0.0.1 -p 6379 cluster info
      register: cluster_info_pre
      changed_when: false

    - name: Assert cluster state is ok
      fail:
        msg: "Cluster is not healthy! Current state: {{ cluster_info_pre.stdout }}"
      when: "'cluster_state:ok' not in cluster_info_pre.stdout"

    - name: Dynamically parse cluster topology for rolling upgrade
      shell: |
        python3 << 'PYEOF'
        import subprocess
        import json

        res = subprocess.run(["redis-cli", "-h", "127.0.0.1", "-p", "6379", "cluster", "nodes"], capture_output=True, text=True)
        lines = res.stdout.splitlines()

        ip_to_host = {f"10.10.0.{10+i}": f"redis-node-{i}" for i in range(1, 200)}

        id_to_ip = {}
        node_list = []
        for line in lines:
            if not line.strip(): continue
            parts = line.split()
            if len(parts) < 8: continue
            node_id = parts[0]
            ip_port = parts[1].split("@")[0].split(",")[0]
            ip = ip_port.split(":")[0]
            id_to_ip[node_id] = ip
            node_list.append(parts)

        masters = []
        replicas = []
        replica_map = {}

        for parts in node_list:
            node_id = parts[0]
            ip_port = parts[1].split("@")[0].split(",")[0]
            ip = ip_port.split(":")[0]
            flags = parts[2]
            master_id = parts[3]
            host = ip_to_host.get(ip)
            if not host: continue
            
            if "master" in flags:
                masters.append(host)
            else:
                replicas.append(host)
                master_ip = id_to_ip.get(master_id)
                master_host = ip_to_host.get(master_ip)
                if master_host:
                    replica_map[master_host] = host

        print(json.dumps({
            "masters": masters,
            "replicas": replicas,
            "replica_map": replica_map
        }))
        PYEOF
      register: topology_json
      changed_when: false

    - name: Set topology facts
      set_fact:
        topology: "{{ topology_json.stdout | from_json }}"

    - name: Create dynamic replica group
      add_host:
        name: "{{ item }}"
        groups: active_replicas
      loop: "{{ topology.replicas }}"

    - name: Create dynamic master group and assign replica variable
      add_host:
        name: "{{ item }}"
        groups: active_masters
        assigned_replica: "{{ topology.replica_map[item] }}"
      loop: "{{ topology.masters }}"

    - name: Verify all nodes are reachable
      command: "redis-cli -h {{ item }} -p 6379 ping"
      loop: "{{ topology.masters + topology.replicas }}"
      register: ping_result
      changed_when: false
      failed_when: "'PONG' not in ping_result.stdout"

    - name: Verify target version differs from current version
      shell: |
        python3 << 'PYEOF'
        import subprocess
        import sys

        target_version = "{{ target_version }}"
        res = subprocess.run(["redis-cli", "-h", "127.0.0.1", "-p", "6379", "cluster", "nodes"], capture_output=True, text=True)
        lines = res.stdout.splitlines()

        nodes = []
        for line in lines:
            if not line.strip(): continue
            parts = line.split()
            if len(parts) < 8: continue
            ip_port = parts[1].split("@")[0].split(",")[0]
            nodes.append(ip_port)

        all_upgraded = True
        for node in nodes:
            n_ip, n_port = node.split(":")
            info = subprocess.run(["redis-cli", "-h", n_ip, "-p", n_port, "INFO", "server"], capture_output=True, text=True)
            version = "unknown"
            for line in info.stdout.splitlines():
                if line.startswith("redis_version:"):
                    version = line.split(":")[1].strip()
            if version != target_version:
                all_upgraded = False

        if all_upgraded:
            print("ALL_UPGRADED")
        else:
            print("PROCEED")
        PYEOF
      register: version_check
      changed_when: false

    - name: Set upgrade need fact
      set_fact:
        is_upgrade_needed: "{{ 'PROCEED' in version_check.stdout }}"

    - name: Handle case where all nodes are already upgraded
      debug:
        msg: "All nodes already on v{{ target_version }} — nothing to do."
      when: not (is_upgrade_needed | bool)

    - name: End playbook cleanly if no upgrade needed
      meta: end_play
      when: not (is_upgrade_needed | bool)

    - name: Run data verify for pre-upgrade integrity baseline
      shell: |
        python3 -c '
        import subprocess
        import hashlib

        # Fetch num_keys from metadata or ansible vars
        ansible_num_keys = {{ num_keys | default('None') }}
        if ansible_num_keys is not None and ansible_num_keys != 'None':
            num_keys = int(ansible_num_keys)
        else:
            res = subprocess.run(["redis-cli", "-c", "-h", "127.0.0.1", "-p", "6379", "GET", "metadata:num_keys"], capture_output=True, text=True)
            meta_val = res.stdout.strip()
            num_keys = int(meta_val) if meta_val and meta_val != "(nil)" else 1000

        missing_count = 0
        mismatch_count = 0
        verified_count = 0

        for i in range(1, num_keys + 1):
            key = f"key:{i:04d}"
            expected_val = hashlib.sha256(key.encode()).hexdigest()
            
            cmd = ["redis-cli", "-c", "-h", "127.0.0.1", "-p", "6379", "GET", key]
            res = subprocess.run(cmd, capture_output=True, text=True)
            
            val = res.stdout.strip()
            
            if not val or val == "(nil)":
                missing_count += 1
            elif val != expected_val:
                mismatch_count += 1
            else:
                verified_count += 1

        if missing_count == 0 and mismatch_count == 0:
            print(f"PASS — {verified_count}/{num_keys} keys verified")
        else:
            print(f"FAIL — {missing_count} missing, {mismatch_count} mismatched")
        '
      register: pre_verify_results
      changed_when: false
      failed_when: "'FAIL' in pre_verify_results.stdout"
      when: is_upgrade_needed | bool

    - name: Display pre-upgrade verification baseline
      debug:
        msg: "Pre-upgrade integrity baseline: {{ pre_verify_results.stdout }}"
      when: is_upgrade_needed | bool

- name: Rolling Upgrade Redis Replica Nodes
  hosts: active_replicas
  serial: 1
  become: yes
  vars:
    target_version: "{{ redis_version | default('7.2.6') }}"
  tasks:
    - name: Save Redis in-memory data to disk
      command: redis-cli SAVE
      failed_when: false
      when: hostvars['redis-node-1']['is_upgrade_needed'] | default(true) | bool

    - name: Create backup directory
      file:
        path: /var/lib/redis-backup
        state: directory
        mode: '0755'
      when: hostvars['redis-node-1']['is_upgrade_needed'] | default(true) | bool

    - name: Back up Redis data before upgrade
      shell: cp -r /var/lib/redis/dump.rdb /var/lib/redis/appendonlydir /var/lib/redis-backup/ || true
      when: hostvars['redis-node-1']['is_upgrade_needed'] | default(true) | bool

    - name: Stop Redis on replica
      shell: pkill redis-server || true
      changed_when: true
      when: hostvars['redis-node-1']['is_upgrade_needed'] | default(true) | bool

    - name: Clean up nodes.conf compatibility issues for rolling upgrade
      shell: |
        python3 -c '
        import os
        config_path = "/var/lib/redis/nodes.conf"
        if os.path.exists(config_path):
            with open(config_path, "r") as f:
                lines = f.readlines()
            new_lines = []
            for line in lines:
                parts = line.split()
                if len(parts) > 1 and "," in parts[1]:
                    parts[1] = parts[1].split(",")[0]
                    line = " ".join(parts) + "\n"
                new_lines.append(line)
            with open(config_path, "w") as f:
                f.writelines(new_lines)
        '
      changed_when: true
      when: hostvars['redis-node-1']['is_upgrade_needed'] | default(true) | bool

    - name: Include redis role to compile and configure target version
      include_role:
        name: redis
      vars:
        redis_version: "{{ target_version }}"
      when: hostvars['redis-node-1']['is_upgrade_needed'] | default(true) | bool

    - name: Wait for replica to rejoin cluster and sync
      command: redis-cli -p 6379 info replication
      register: replication_info
      until: "'master_link_status:up' in replication_info.stdout or 'role:master' in replication_info.stdout"
      retries: 30
      delay: 2
      changed_when: false
      when: hostvars['redis-node-1']['is_upgrade_needed'] | default(true) | bool

    - name: Check that cluster state is ok
      command: redis-cli -h 10.10.0.11 cluster info
      register: cluster_info_cmd
      failed_when: "'cluster_state:ok' not in cluster_info_cmd.stdout"
      changed_when: false
      when: hostvars['redis-node-1']['is_upgrade_needed'] | default(true) | bool

    - name: Print upgrade progress and status
      debug:
        msg: "Upgraded replica {{ inventory_hostname }} — cluster: ok"
      when: hostvars['redis-node-1']['is_upgrade_needed'] | default(true) | bool

- name: Rolling Upgrade Redis Master Nodes
  hosts: active_masters
  serial: 1
  become: yes
  vars:
    target_version: "{{ redis_version | default('7.2.6') }}"
  tasks:
    - name: Save Redis in-memory data to disk
      command: redis-cli SAVE
      failed_when: false
      when: hostvars['redis-node-1']['is_upgrade_needed'] | default(true) | bool

    - name: Create backup directory
      file:
        path: /var/lib/redis-backup
        state: directory
        mode: '0755'
      when: hostvars['redis-node-1']['is_upgrade_needed'] | default(true) | bool

    - name: Back up Redis data before upgrade
      shell: cp -r /var/lib/redis/dump.rdb /var/lib/redis/appendonlydir /var/lib/redis-backup/ || true
      when: hostvars['redis-node-1']['is_upgrade_needed'] | default(true) | bool

    - name: Run CLUSTER FAILOVER on the replica
      command: redis-cli -p 6379 CLUSTER FAILOVER
      delegate_to: "{{ hostvars[inventory_hostname]['assigned_replica'] }}"
      when: hostvars['redis-node-1']['is_upgrade_needed'] | default(true) | bool

    - name: Wait for old master to become a replica
      command: redis-cli -p 6379 info replication
      register: old_master_info
      until: "'role:slave' in old_master_info.stdout"
      retries: 30
      delay: 2
      changed_when: false
      when: hostvars['redis-node-1']['is_upgrade_needed'] | default(true) | bool

    - name: Stop Redis on old master
      shell: pkill redis-server || true
      changed_when: true
      when: hostvars['redis-node-1']['is_upgrade_needed'] | default(true) | bool

    - name: Clean up nodes.conf compatibility issues for rolling upgrade
      shell: |
        python3 -c '
        import os
        config_path = "/var/lib/redis/nodes.conf"
        if os.path.exists(config_path):
            with open(config_path, "r") as f:
                lines = f.readlines()
            new_lines = []
            for line in lines:
                parts = line.split()
                if len(parts) > 1 and "," in parts[1]:
                    parts[1] = parts[1].split(",")[0]
                    line = " ".join(parts) + "\n"
                new_lines.append(line)
            with open(config_path, "w") as f:
                f.writelines(new_lines)
        '
      changed_when: true
      when: hostvars['redis-node-1']['is_upgrade_needed'] | default(true) | bool

    - name: Include redis role to compile and configure target version
      include_role:
        name: redis
      vars:
        redis_version: "{{ target_version }}"
      when: hostvars['redis-node-1']['is_upgrade_needed'] | default(true) | bool

    - name: Wait for old master (now replica) to rejoin and sync
      command: redis-cli -p 6379 info replication
      register: replication_info
      until: "'master_link_status:up' in replication_info.stdout or 'role:master' in replication_info.stdout"
      retries: 30
      delay: 2
      changed_when: false
      when: hostvars['redis-node-1']['is_upgrade_needed'] | default(true) | bool

    - name: Check that cluster state is ok
      command: redis-cli -h 10.10.0.11 cluster info
      register: cluster_info_cmd
      failed_when: "'cluster_state:ok' not in cluster_info_cmd.stdout"
      changed_when: false
      when: hostvars['redis-node-1']['is_upgrade_needed'] | default(true) | bool

    - name: Print upgrade progress and status
      debug:
        msg: "Upgraded master {{ inventory_hostname }} — cluster: ok"
      when: hostvars['redis-node-1']['is_upgrade_needed'] | default(true) | bool

- name: Verify Upgrade and Data Integrity
  hosts: redis-node-1
  become: yes
  vars:
    target_version: "{{ redis_version | default('7.2.6') }}"
  tasks:
    - name: Run data verification
      shell: |
        python3 -c '
        import subprocess
        import hashlib

        # Fetch num_keys from metadata or ansible vars
        ansible_num_keys = {{ num_keys | default('None') }}
        if ansible_num_keys is not None and ansible_num_keys != 'None':
            num_keys = int(ansible_num_keys)
        else:
            res = subprocess.run(["redis-cli", "-c", "-h", "127.0.0.1", "-p", "6379", "GET", "metadata:num_keys"], capture_output=True, text=True)
            meta_val = res.stdout.strip()
            num_keys = int(meta_val) if meta_val and meta_val != "(nil)" else 1000

        missing_count = 0
        mismatch_count = 0
        verified_count = 0

        for i in range(1, num_keys + 1):
            key = f"key:{i:04d}"
            expected_val = hashlib.sha256(key.encode()).hexdigest()
            
            cmd = ["redis-cli", "-c", "-h", "127.0.0.1", "-p", "6379", "GET", key]
            res = subprocess.run(cmd, capture_output=True, text=True)
            
            val = res.stdout.strip()
            
            if not val or val == "(nil)":
                missing_count += 1
            elif val != expected_val:
                mismatch_count += 1
            else:
                verified_count += 1

        if missing_count == 0 and mismatch_count == 0:
            print(f"PASS — {verified_count}/{num_keys} keys verified")
        else:
            print(f"FAIL — {missing_count} missing, {mismatch_count} mismatched")
        '
      register: data_verification_results
      changed_when: false
      failed_when: "'FAIL' in data_verification_results.stdout"
      when: is_upgrade_needed | bool

    - name: Display data verification output
      debug:
        msg: "{{ data_verification_results.stdout }}"
      when: is_upgrade_needed | bool

    - name: Run cluster status check
      shell: |
        python3 << 'PYEOF'
        import subprocess
        import re

        def get_output(cmd):
            try:
                res = subprocess.run(cmd, shell=True, capture_output=True, text=True)
                return res.stdout
            except Exception:
                return ""

        cluster_info = get_output("redis-cli -h 127.0.0.1 -p 6379 cluster info")
        state = "unknown"
        for line in cluster_info.splitlines():
            if line.startswith("cluster_state:"):
                state = line.split(":")[1].strip()

        nodes_output = get_output("redis-cli -h 127.0.0.1 -p 6379 cluster nodes")
        nodes = []
        id_to_ip = {}
        for line in nodes_output.splitlines():
            if not line.strip():
                continue
            parts = line.split()
            if len(parts) < 8:
                continue
            node_id = parts[0]
            ip_port = parts[1].split("@")[0].split(",")[0]
            id_to_ip[node_id] = ip_port
            nodes.append(parts)

        masters = []
        replicas = []
        all_target_version = True

        for parts in nodes:
            node_id = parts[0]
            ip_port = parts[1].split("@")[0].split(",")[0]
            ip = ip_port.split(":")[0]
            port = ip_port.split(":")[1]
            flags = parts[2]
            master_id = parts[3]

            info_server = get_output("redis-cli -h " + ip + " -p " + port + " INFO server")
            version = "unknown"
            for line in info_server.splitlines():
                if line.startswith("redis_version:"):
                    version = line.split(":")[1].strip()
            if version != "{{ target_version }}":
                all_target_version = False

            info_mem = get_output("redis-cli -h " + ip + " -p " + port + " INFO memory")
            mem = "unknown"
            for line in info_mem.splitlines():
                if line.startswith("used_memory_human:"):
                    mem = line.split(":")[1].strip()

            if "master" in flags:
                slots = ""
                if len(parts) > 8:
                    slots = " ".join(parts[8:])
                info_keys = get_output("redis-cli -h " + ip + " -p " + port + " INFO keyspace")
                keys = 0
                for line in info_keys.splitlines():
                    if line.startswith("db0:"):
                        match = re.search(r"keys=(\d+)", line)
                        if match:
                            keys = int(match.group(1))
                masters.append({
                    "ip_port": ip_port,
                    "version": version,
                    "slots": slots,
                    "keys": keys,
                    "mem": mem
                })
            else:
                replicas.append({
                    "ip_port": ip_port,
                    "version": version,
                    "master_id": master_id,
                    "mem": mem
                })

        masters.sort(key=lambda x: x["ip_port"])
        replicas.sort(key=lambda x: x["ip_port"])

        print("Cluster State: " + state)
        print("MASTERS")
        for m in masters:
            print(" " + m["ip_port"] + " [master] v" + m["version"] + " slots: " + m["slots"] + " keys: " + str(m["keys"]) + " mem: " + m["mem"])
        print("REPLICAS")
        for r in replicas:
            master_ip_port = id_to_ip.get(r["master_id"], "unknown")
            print(" " + r["ip_port"] + " [replica] v" + r["version"] + " replicating: " + master_ip_port + " mem: " + r["mem"])
        
        if all_target_version and state == "ok":
            print("STATUS: ALL_OK")
        else:
            print("STATUS: FAIL")
        PYEOF
      register: status_results
      changed_when: false
      failed_when: "'STATUS: ALL_OK' not in status_results.stdout"
      when: is_upgrade_needed | bool

    - name: Display cluster status
      debug:
        msg: "{{ status_results.stdout }}"
      when: is_upgrade_needed | bool

    - name: Print upgrade complete confirmation
      debug:
        msg: "UPGRADE COMPLETE — all nodes on v{{ target_version }}, data integrity verified"
      when: is_upgrade_needed | bool