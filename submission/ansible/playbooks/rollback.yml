---
- name: Pre-Flight Checks & Dynamic Topology Discovery for Rollback
  hosts: redis-node-1
  become: yes
  vars:
    target_version: "{{ target_version | default('7.0.15') }}"
  tasks:
    - name: Verify cluster health (informational only)
      command: redis-cli -h 127.0.0.1 -p 6379 cluster info
      register: cluster_info_pre
      changed_when: false
      ignore_errors: yes

    - name: Dynamically parse cluster topology for rolling rollback
      shell: |
        python3 << 'PYEOF'
        import subprocess
        import json
        import sys

        target_version = "{{ target_version }}"

        def get_output(cmd):
            try:
                res = subprocess.run(cmd, shell=True, capture_output=True, text=True)
                return res.stdout
            except Exception:
                return ""

        res = get_output("redis-cli -h 127.0.0.1 -p 6379 cluster nodes")
        lines = res.splitlines()

        ip_to_host = {
            "10.10.0.11": "redis-node-1",
            "10.10.0.12": "redis-node-2",
            "10.10.0.13": "redis-node-3",
            "10.10.0.14": "redis-node-4",
            "10.10.0.15": "redis-node-5",
            "10.10.0.16": "redis-node-6"
        }

        id_to_ip = {}
        node_list = []
        for line in lines:
            if not line.strip(): continue
            parts = line.split()
            if len(parts) < 8: continue
            node_id = parts[0]
            ip_port = parts[1].split("@")[0].split(",")[0]
            ip = ip_port.split(":")[0]
            id_to_ip[node_id] = ip
            node_list.append(parts)

        rollback_replicas = []
        rollback_masters = []
        replica_map = {}

        # Check each node version
        node_versions = {}
        for parts in node_list:
            node_id = parts[0]
            ip_port = parts[1].split("@")[0].split(",")[0]
            ip = ip_port.split(":")[0]
            port = ip_port.split(":")[1]
            info_server = get_output(f"redis-cli -h {ip} -p {port} INFO server")
            version = "unknown"
            for line in info_server.splitlines():
                if line.startswith("redis_version:"):
                    version = line.split(":")[1].strip()
            node_versions[node_id] = version

        for parts in node_list:
            node_id = parts[0]
            ip_port = parts[1].split("@")[0].split(",")[0]
            ip = ip_port.split(":")[0]
            flags = parts[2]
            master_id = parts[3]
            host = ip_to_host.get(ip)
            if not host: continue
            
            version = node_versions.get(node_id, "unknown")
            if version != target_version:
                if "master" in flags:
                    rollback_masters.append(host)
                    replica_host = None
                    for r_parts in node_list:
                        r_id = r_parts[0]
                        r_flags = r_parts[2]
                        r_master_id = r_parts[3]
                        r_ip_port = r_parts[1].split("@")[0].split(",")[0]
                        r_ip = r_ip_port.split(":")[0]
                        if "slave" in r_flags or "replica" in r_flags:
                            if r_master_id == node_id:
                                replica_host = ip_to_host.get(r_ip)
                                if replica_host:
                                    break
                    if replica_host:
                        replica_map[host] = replica_host
                else:
                    rollback_replicas.append(host)

        print(json.dumps({
            "rollback_replicas": rollback_replicas,
            "rollback_masters": rollback_masters,
            "replica_map": replica_map,
            "is_rollback_needed": len(rollback_replicas) > 0 or len(rollback_masters) > 0
        }))
        PYEOF
      register: topology_json
      changed_when: false

    - name: Set topology facts
      set_fact:
        topology: "{{ topology_json.stdout | from_json }}"

    - name: Handle case where no nodes require rollback
      debug:
        msg: "All nodes in the cluster are already at the target version ({{ target_version }}). No rollback needed."
      when: not topology.is_rollback_needed

    - name: Create dynamic rollback replica group
      add_host:
        name: "{{ item }}"
        groups: rollback_replicas
      loop: "{{ topology.rollback_replicas }}"
      when: topology.is_rollback_needed

    - name: Create dynamic rollback master group and assign replica variable
      add_host:
        name: "{{ item }}"
        groups: rollback_masters
        assigned_replica: "{{ topology.replica_map[item] | default('') }}"
      loop: "{{ topology.rollback_masters }}"
      when: topology.is_rollback_needed

    # Bypassing node reachability checks because recovery targets can be offline/crashed

    - name: Run data verify for pre-rollback integrity baseline
      shell: |
        python3 -c '
        import subprocess
        import hashlib

        ansible_num_keys = {{ num_keys | default('None') }}
        if ansible_num_keys is not None and ansible_num_keys != 'None':
            num_keys = int(ansible_num_keys)
        else:
            res = subprocess.run(["redis-cli", "-c", "-h", "127.0.0.1", "-p", "6379", "GET", "metadata:num_keys"], capture_output=True, text=True)
            meta_val = res.stdout.strip()
            num_keys = int(meta_val) if meta_val and meta_val != "(nil)" else 1000

        missing_count = 0
        mismatch_count = 0
        verified_count = 0

        for i in range(1, num_keys + 1):
            key = f"key:{i:04d}"
            expected_val = hashlib.sha256(key.encode()).hexdigest()
            cmd = ["redis-cli", "-c", "-h", "127.0.0.1", "-p", "6379", "GET", key]
            res = subprocess.run(cmd, capture_output=True, text=True)
            val = res.stdout.strip()
            if not val or val == "(nil)":
                missing_count += 1
            elif val != expected_val:
                mismatch_count += 1
            else:
                verified_count += 1

        if missing_count == 0 and mismatch_count == 0:
            print(f"PASS — {verified_count}/{num_keys} keys verified")
        else:
            print(f"FAIL — {missing_count} missing, {mismatch_count} mismatched")
        '
      register: pre_verify_results
      changed_when: false
      failed_when: "'FAIL' in pre_verify_results.stdout"
      when: topology.is_rollback_needed

    - name: Display pre-rollback verification baseline
      debug:
        msg: "Pre-rollback integrity baseline: {{ pre_verify_results.stdout }}"
      when: topology.is_rollback_needed and pre_verify_results.stdout is defined

- name: Rollback Redis Replica Nodes
  hosts: rollback_replicas
  serial: 1
  become: yes
  vars:
    target_version: "{{ target_version | default('7.0.15') }}"
  tasks:
    - name: Stop Redis on replica
      shell: pkill redis-server || true
      changed_when: true

    - name: Restore compatible RDB and AOF backup if available, otherwise clear data
      shell: |
        if [ -d /var/lib/redis-backup ] && [ -f /var/lib/redis-backup/dump.rdb ]; then
          rm -rf /var/lib/redis/dump.rdb /var/lib/redis/appendonlydir
          cp -r /var/lib/redis-backup/dump.rdb /var/lib/redis/
          if [ -d /var/lib/redis-backup/appendonlydir ]; then
            cp -r /var/lib/redis-backup/appendonlydir /var/lib/redis/
          fi
          chown -R redis:redis /var/lib/redis/
        else
          rm -rf /var/lib/redis/dump.rdb /var/lib/redis/appendonlydir
        fi
      changed_when: true

    - name: Clean up nodes.conf compatibility issues for rolling rollback
      shell: |
        python3 -c '
        import os
        config_path = "/var/lib/redis/nodes.conf"
        if os.path.exists(config_path):
            with open(config_path, "r") as f:
                lines = f.readlines()
            new_lines = []
            for line in lines:
                parts = line.split()
                if len(parts) > 1 and "," in parts[1]:
                    parts[1] = parts[1].split(",")[0]
                    line = " ".join(parts) + "\n"
                new_lines.append(line)
            with open(config_path, "w") as f:
                f.writelines(new_lines)
        '
      changed_when: true

    - name: Include redis role to compile and configure target version
      include_role:
        name: redis
      vars:
        redis_version: "{{ target_version }}"

    - name: Ensure Redis is running
      shell: "redis-server /etc/redis/redis.conf --daemonize yes"
      become: yes
      changed_when: true

    - name: Wait for replica to rejoin cluster
      command: redis-cli -p 6379 info replication
      register: replication_info
      until: "'role:slave' in replication_info.stdout or 'role:master' in replication_info.stdout"
      retries: 30
      delay: 2
      changed_when: false

    - name: Check that cluster state is ok
      command: redis-cli -h 10.10.0.11 cluster info
      register: cluster_info_cmd
      failed_when: "'cluster_state:ok' not in cluster_info_cmd.stdout"
      changed_when: false

    - name: Print rollback progress and status
      debug:
        msg: "Rolled back replica {{ inventory_hostname }} — cluster: ok"

- name: Rollback Redis Master Nodes
  hosts: rollback_masters
  serial: 1
  become: yes
  vars:
    target_version: "{{ target_version | default('7.0.15') }}"
  tasks:
    - name: Run CLUSTER FAILOVER TAKEOVER on the replica if replica exists
      command: redis-cli -p 6379 CLUSTER FAILOVER TAKEOVER
      delegate_to: "{{ hostvars[inventory_hostname]['assigned_replica'] }}"
      when: hostvars[inventory_hostname]['assigned_replica'] is defined and hostvars[inventory_hostname]['assigned_replica'] != ""

    - name: Wait for old master to become a replica
      command: redis-cli -p 6379 info replication
      register: old_master_info
      until: "'role:slave' in old_master_info.stdout"
      retries: 30
      delay: 2
      changed_when: false
      when: hostvars[inventory_hostname]['assigned_replica'] is defined and hostvars[inventory_hostname]['assigned_replica'] != ""

    - name: Stop Redis on the newly promoted master (the replica) to restore data
      shell: pkill redis-server || true
      delegate_to: "{{ hostvars[inventory_hostname]['assigned_replica'] }}"
      when: hostvars[inventory_hostname]['assigned_replica'] is defined and hostvars[inventory_hostname]['assigned_replica'] != ""

    - name: Restore compatible RDB and AOF backup on the newly promoted master
      shell: |
        if [ -d /var/lib/redis-backup ] && [ -f /var/lib/redis-backup/dump.rdb ]; then
          rm -rf /var/lib/redis/dump.rdb /var/lib/redis/appendonlydir
          cp -r /var/lib/redis-backup/dump.rdb /var/lib/redis/
          if [ -d /var/lib/redis-backup/appendonlydir ]; then
            cp -r /var/lib/redis-backup/appendonlydir /var/lib/redis/
          fi
          chown -R redis:redis /var/lib/redis/
        else
          rm -rf /var/lib/redis/dump.rdb /var/lib/redis/appendonlydir
        fi
      delegate_to: "{{ hostvars[inventory_hostname]['assigned_replica'] }}"
      when: hostvars[inventory_hostname]['assigned_replica'] is defined and hostvars[inventory_hostname]['assigned_replica'] != ""

    - name: Clean up nodes.conf compatibility issues on the newly promoted master
      shell: |
        python3 -c '
        import os
        config_path = "/var/lib/redis/nodes.conf"
        if os.path.exists(config_path):
            with open(config_path, "r") as f:
                lines = f.readlines()
            new_lines = []
            for line in lines:
                parts = line.split()
                if len(parts) > 1 and "," in parts[1]:
                    parts[1] = parts[1].split(",")[0]
                    line = " ".join(parts) + "\n"
                new_lines.append(line)
            with open(config_path, "w") as f:
                f.writelines(new_lines)
        '
      delegate_to: "{{ hostvars[inventory_hostname]['assigned_replica'] }}"
      when: hostvars[inventory_hostname]['assigned_replica'] is defined and hostvars[inventory_hostname]['assigned_replica'] != ""

    - name: Start Redis manually on the newly promoted master
      shell: "redis-server /etc/redis/redis.conf --daemonize yes"
      become: yes
      delegate_to: "{{ hostvars[inventory_hostname]['assigned_replica'] }}"
      when: hostvars[inventory_hostname]['assigned_replica'] is defined and hostvars[inventory_hostname]['assigned_replica'] != ""

    - name: Wait for the newly promoted master to be ready
      command: redis-cli -p 6379 ping
      register: promoted_master_ping
      until: "'PONG' in promoted_master_ping.stdout"
      retries: 30
      delay: 2
      delegate_to: "{{ hostvars[inventory_hostname]['assigned_replica'] }}"
      when: hostvars[inventory_hostname]['assigned_replica'] is defined and hostvars[inventory_hostname]['assigned_replica'] != ""

    - name: Stop Redis on old master
      shell: pkill redis-server || true
      changed_when: true

    - name: Restore compatible RDB and AOF backup if available, otherwise clear data
      shell: |
        if [ -d /var/lib/redis-backup ] && [ -f /var/lib/redis-backup/dump.rdb ]; then
          rm -rf /var/lib/redis/dump.rdb /var/lib/redis/appendonlydir
          cp -r /var/lib/redis-backup/dump.rdb /var/lib/redis/
          if [ -d /var/lib/redis-backup/appendonlydir ]; then
            cp -r /var/lib/redis-backup/appendonlydir /var/lib/redis/
          fi
          chown -R redis:redis /var/lib/redis/
        else
          rm -rf /var/lib/redis/dump.rdb /var/lib/redis/appendonlydir
        fi
      changed_when: true

    - name: Clean up nodes.conf compatibility issues for rolling rollback
      shell: |
        python3 -c '
        import os
        config_path = "/var/lib/redis/nodes.conf"
        if os.path.exists(config_path):
            with open(config_path, "r") as f:
                lines = f.readlines()
            new_lines = []
            for line in lines:
                parts = line.split()
                if len(parts) > 1 and "," in parts[1]:
                    parts[1] = parts[1].split(",")[0]
                    line = " ".join(parts) + "\n"
                new_lines.append(line)
            with open(config_path, "w") as f:
                f.writelines(new_lines)
        '
      changed_when: true

    - name: Include redis role to compile and configure target version
      include_role:
        name: redis
      vars:
        redis_version: "{{ target_version }}"

    - name: Ensure Redis is running
      shell: "redis-server /etc/redis/redis.conf --daemonize yes"
      become: yes
      changed_when: true

    - name: Wait for old master (now replica) to rejoin
      command: redis-cli -p 6379 info replication
      register: replication_info
      until: "'role:slave' in replication_info.stdout or 'role:master' in replication_info.stdout"
      retries: 30
      delay: 2
      changed_when: false

    - name: Check that cluster state is ok
      command: redis-cli -h 10.10.0.11 cluster info
      register: cluster_info_cmd
      failed_when: "'cluster_state:ok' not in cluster_info_cmd.stdout"
      changed_when: false

    - name: Print rollback progress and status
      debug:
        msg: "Rolled back master {{ inventory_hostname }} — cluster: ok"

- name: Verify Rollback and Data Integrity
  hosts: redis-node-1
  become: yes
  vars:
    target_version: "{{ target_version | default('7.0.15') }}"
  tasks:
    - name: Run data verification
      shell: |
        python3 -c '
        import subprocess
        import hashlib

        ansible_num_keys = {{ num_keys | default('None') }}
        if ansible_num_keys is not None and ansible_num_keys != 'None':
            num_keys = int(ansible_num_keys)
        else:
            res = subprocess.run(["redis-cli", "-c", "-h", "127.0.0.1", "-p", "6379", "GET", "metadata:num_keys"], capture_output=True, text=True)
            meta_val = res.stdout.strip()
            num_keys = int(meta_val) if meta_val and meta_val != "(nil)" else 1000

        missing_count = 0
        mismatch_count = 0
        verified_count = 0

        for i in range(1, num_keys + 1):
            key = f"key:{i:04d}"
            expected_val = hashlib.sha256(key.encode()).hexdigest()
            cmd = ["redis-cli", "-c", "-h", "127.0.0.1", "-p", "6379", "GET", key]
            res = subprocess.run(cmd, capture_output=True, text=True)
            val = res.stdout.strip()
            if not val or val == "(nil)":
                missing_count += 1
            elif val != expected_val:
                mismatch_count += 1
            else:
                verified_count += 1

        if missing_count == 0 and mismatch_count == 0:
            print(f"PASS — {verified_count}/{num_keys} keys verified")
        else:
            print(f"FAIL — {missing_count} missing, {mismatch_count} mismatched")
        '
      register: data_verification_results
      changed_when: false
      failed_when: "'FAIL' in data_verification_results.stdout"
      when: hostvars['redis-node-1']['topology']['is_rollback_needed']

    - name: Display data verification output
      debug:
        msg: "{{ data_verification_results.stdout }}"
      when: hostvars['redis-node-1']['topology']['is_rollback_needed'] and data_verification_results.stdout is defined

    - name: Run cluster status check
      shell: |
        python3 << 'PYEOF'
        import subprocess
        import re

        def get_output(cmd):
            try:
                res = subprocess.run(cmd, shell=True, capture_output=True, text=True)
                return res.stdout
            except Exception:
                return ""

        cluster_info = get_output("redis-cli -h 127.0.0.1 -p 6379 cluster info")
        state = "unknown"
        for line in cluster_info.splitlines():
            if line.startswith("cluster_state:"):
                state = line.split(":")[1].strip()

        nodes_output = get_output("redis-cli -h 127.0.0.1 -p 6379 cluster nodes")
        nodes = []
        id_to_ip = {}
        for line in nodes_output.splitlines():
            if not line.strip():
                continue
            parts = line.split()
            if len(parts) < 8:
                continue
            node_id = parts[0]
            ip_port = parts[1].split("@")[0].split(",")[0]
            id_to_ip[node_id] = ip_port
            nodes.append(parts)

        masters = []
        replicas = []
        all_target_version = True

        for parts in nodes:
            node_id = parts[0]
            ip_port = parts[1].split("@")[0].split(",")[0]
            ip = ip_port.split(":")[0]
            port = ip_port.split(":")[1]
            flags = parts[2]
            master_id = parts[3]

            info_server = get_output("redis-cli -h " + ip + " -p " + port + " INFO server")
            version = "unknown"
            for line in info_server.splitlines():
                if line.startswith("redis_version:"):
                    version = line.split(":")[1].strip()
            if version != "{{ target_version }}":
                all_target_version = False

            info_mem = get_output("redis-cli -h " + ip + " -p " + port + " INFO memory")
            mem = "unknown"
            for line in info_mem.splitlines():
                if line.startswith("used_memory_human:"):
                    mem = line.split(":")[1].strip()

            if "master" in flags:
                slots = ""
                if len(parts) > 8:
                    slots = " ".join(parts[8:])
                info_keys = get_output("redis-cli -h " + ip + " -p " + port + " INFO keyspace")
                keys = 0
                for line in info_keys.splitlines():
                    if line.startswith("db0:"):
                        match = re.search(r"keys=(\d+)", line)
                        if match:
                            keys = int(match.group(1))
                masters.append({
                    "ip_port": ip_port,
                    "version": version,
                    "slots": slots,
                    "keys": keys,
                    "mem": mem
                })
            else:
                replicas.append({
                    "ip_port": ip_port,
                    "version": version,
                    "master_id": master_id,
                    "mem": mem
                })

        masters.sort(key=lambda x: x["ip_port"])
        replicas.sort(key=lambda x: x["ip_port"])

        print("Cluster State: " + state)
        print("MASTERS")
        for m in masters:
            print(" " + m["ip_port"] + " [master] v" + m["version"] + " slots: " + m["slots"] + " keys: " + str(m["keys"]) + " mem: " + m["mem"])
        print("REPLICAS")
        for r in replicas:
            master_ip_port = id_to_ip.get(r["master_id"], "unknown")
            print(" " + r["ip_port"] + " [replica] v" + r["version"] + " replicating: " + master_ip_port + " mem: " + r["mem"])
        
        if all_target_version and state == "ok":
            print("STATUS: ALL_OK")
        else:
            print("STATUS: FAIL")
        PYEOF
      register: status_results
      changed_when: false
      failed_when: "'STATUS: ALL_OK' not in status_results.stdout"
      when: hostvars['redis-node-1']['topology']['is_rollback_needed']

    - name: Display cluster status
      debug:
        msg: "{{ status_results.stdout }}"
      when: hostvars['redis-node-1']['topology']['is_rollback_needed'] and status_results.stdout is defined

    - name: Print rollback complete confirmation
      debug:
        msg: "ROLLBACK COMPLETE — all nodes on v{{ target_version }}, data integrity verified"
      when: hostvars['redis-node-1']['topology']['is_rollback_needed']
