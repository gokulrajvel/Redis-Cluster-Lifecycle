---
- name: Verify Seeded Data in Redis Cluster
  hosts: redis-node-1
  become: yes
  tasks:
    - name: Retrieve and verify all keys
      shell: |
        python3 -c '
        import subprocess
        import hashlib

        # Fetch num_keys from metadata or ansible vars
        ansible_num_keys = {{ num_keys | default('None') }}
        if ansible_num_keys is not None and ansible_num_keys != 'None':
            num_keys = int(ansible_num_keys)
        else:
            res = subprocess.run(["redis-cli", "-c", "-h", "127.0.0.1", "-p", "6379", "GET", "metadata:num_keys"], capture_output=True, text=True)
            meta_val = res.stdout.strip()
            num_keys = int(meta_val) if meta_val and meta_val != "(nil)" else 1000

        missing_count = 0
        mismatch_count = 0
        verified_count = 0

        for i in range(1, num_keys + 1):
            key = f"key:{i:04d}"
            expected_val = hashlib.sha256(key.encode()).hexdigest()
            
            cmd = ["redis-cli", "-c", "-h", "127.0.0.1", "-p", "6379", "GET", key]
            res_val = subprocess.run(cmd, capture_output=True, text=True)
            val = res_val.stdout.strip()
            
            if not val or val == "(nil)":
                missing_count += 1
            elif val != expected_val:
                mismatch_count += 1
            else:
                verified_count += 1

        if missing_count == 0 and mismatch_count == 0:
            print(f"PASS — {verified_count}/{num_keys} keys verified")
        else:
            print(f"FAIL — {missing_count} missing, {mismatch_count} mismatched")
        '
      register: verify_results
      changed_when: false
      failed_when: "'FAIL' in verify_results.stdout"

    - name: Display Verification Results
      debug:
        msg: "{{ verify_results.stdout }}"
...
