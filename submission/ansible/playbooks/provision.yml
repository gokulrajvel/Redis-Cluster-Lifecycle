---
- name: Provision Redis Cluster Nodes
  hosts: redis_nodes
  become: yes
  roles:
    - redis

- name: Form Redis Cluster
  hosts: cluster_master
  become: yes
  vars:
    all_node_ips:
      - "10.10.0.11:6379"
      - "10.10.0.12:6379"
      - "10.10.0.13:6379"
      - "10.10.0.14:6379"
      - "10.10.0.15:6379"
      - "10.10.0.16:6379"
  tasks:
    - name: Check if cluster is already formed
      command: redis-cli -p 6379 cluster info
      register: cluster_info_check
      changed_when: false
      ignore_errors: yes

    - name: Initialize Redis Cluster
      command: >
        redis-cli --cluster create
        {{ all_node_ips | join(' ') }}
        --cluster-replicas {{ cluster_replicas | default(1) }} --cluster-yes
      when: "'cluster_state:ok' not in cluster_info_check.stdout"
